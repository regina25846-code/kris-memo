<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 240px;
  background: #1e1e2a;
  border-radius: 10px;
  overflow: hidden;
  user-select: none;
  font-family: '맑은 고딕','Malgun Gothic',sans-serif;
  color: #e0e0e0;
}
#drag-handle {
  background: #161622;
  padding: 7px 10px 6px;
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #2e2e40;
  -webkit-app-region: drag;
}
.drag-title { font-size: 11px; color: #888; letter-spacing: 0.3px; }
#close-btn {
  background: none; border: none; color: #555;
  cursor: pointer; font-size: 14px; line-height: 1;
  -webkit-app-region: no-drag; padding: 0 2px;
}
#close-btn:hover { color: #aaa; }

.section { padding: 8px 10px 6px; }
.section label { font-size: 11px; color: #666; display: block; margin-bottom: 5px; }

.color-row { display: flex; align-items: center; gap: 6px; width: 100%; }
.color-swatch { width: 28px; height: 28px; border-radius: 5px; border: 1px solid #333; flex-shrink: 0; cursor: pointer; }
.hex-input {
  flex: 1; min-width: 0; height: 28px; border: 1px solid #333;
  border-radius: 5px; background: #2a2a38;
  color: #e0e0e0; font-size: 12px; font-family: 'Consolas','맑은 고딕',monospace;
  padding: 0 8px; outline: none; -webkit-app-region: no-drag;
}
.hex-input:focus { border-color: #555; }
.auto-btn {
  font-size: 10px; color: #666; background: none; border: 1px solid #333;
  border-radius: 4px; cursor: pointer; padding: 3px 6px; white-space: nowrap;
  -webkit-app-region: no-drag;
}
.auto-btn:hover { color: #aaa; border-color: #555; }
.eyedrop-btn {
  width: 26px; height: 26px; flex-shrink: 0;
  background: none; border: 1px solid #333; border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #666; padding: 0; -webkit-app-region: no-drag;
}
.eyedrop-btn:hover { color: #aaa; border-color: #555; }

#preview {
  margin: 4px 10px 0;
  height: 36px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  border: 1px solid rgba(255,255,255,0.08);
  transition: background 0.15s, color 0.15s;
  letter-spacing: 0.3px;
}

#apply-btn {
  display: block;
  margin: 8px 10px 10px;
  width: calc(100% - 20px);
  padding: 7px;
  background: #4a7fd4;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  -webkit-app-region: no-drag;
}
#apply-btn:hover { background: #3a6fc4; }
</style>
</head>
<body>
<div id="drag-handle">
  <span class="drag-title">할 것 영역 색상</span>
  <button id="close-btn">✕</button>
</div>

<div class="section">
  <label>배경색</label>
  <div class="color-row">
    <div class="color-swatch" id="bg-swatch" title="클릭하여 색상 선택"></div>
    <input type="text" class="hex-input" id="bg-color" value="#272830" maxlength="7" spellcheck="false">
    <button class="eyedrop-btn" id="eyedrop-bg" title="화면에서 색상 추출">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2l9 9-5 5-9-9 5-5z"/><path d="M3 18l3 3h3l-3-3"/><line x1="6" y1="21" x2="9" y2="18"/></svg>
    </button>
  </div>
</div>

<div class="section">
  <label>글자색</label>
  <div class="color-row">
    <div class="color-swatch" id="text-swatch" title="클릭하여 색상 선택"></div>
    <input type="text" class="hex-input" id="text-color" value="#a0a8d0" maxlength="7" spellcheck="false">
    <button class="auto-btn" id="auto-btn">자동</button>
    <button class="eyedrop-btn" id="eyedrop-text" title="화면에서 색상 추출">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2l9 9-5 5-9-9 5-5z"/><path d="M3 18l3 3h3l-3-3"/><line x1="6" y1="21" x2="9" y2="18"/></svg>
    </button>
  </div>
</div>

<div id="preview">할 것 미리보기</div>

<button id="apply-btn">적용</button>
<input type="color" id="bg-color-native" style="position:fixed;bottom:0;left:0;opacity:0;width:1px;height:1px;pointer-events:none;">
<input type="color" id="text-color-native" style="position:fixed;bottom:0;left:0;opacity:0;width:1px;height:1px;pointer-events:none;">

<script>
const bgInput      = document.getElementById('bg-color');
const textInput    = document.getElementById('text-color');
const bgSwatch     = document.getElementById('bg-swatch');
const textSwatch   = document.getElementById('text-swatch');
const preview      = document.getElementById('preview');
const bgNative     = document.getElementById('bg-color-native');
const textNative   = document.getElementById('text-color-native');

function autoContrast(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.55 ? '#1a1828' : '#f0eef8';
}

function updatePreview() {
  bgSwatch.style.background   = bgInput.value;
  textSwatch.style.background = textInput.value;
  preview.style.background    = bgInput.value;
  preview.style.color         = textInput.value;
}

function isValidHex(v) { return /^#[0-9a-fA-F]{6}$/.test(v); }

bgInput.addEventListener('input', () => {
  if (!isValidHex(bgInput.value)) return;
  textInput.value = autoContrast(bgInput.value);
  updatePreview();
});
textInput.addEventListener('input', () => {
  if (!isValidHex(textInput.value)) return;
  updatePreview();
});

document.getElementById('auto-btn').addEventListener('click', () => {
  textInput.value = autoContrast(bgInput.value);
  updatePreview();
});

document.getElementById('apply-btn').addEventListener('click', () => {
  window.api.todoColorPickApply(bgInput.value, textInput.value);
});

document.getElementById('close-btn').addEventListener('click', () => {
  window.api.todoColorPickClose();
});

bgSwatch.addEventListener('click', () => {
  bgNative.value = isValidHex(bgInput.value) ? bgInput.value : '#272830';
  bgNative.click();
});
bgNative.addEventListener('input', () => {
  bgInput.value = bgNative.value;
  textInput.value = autoContrast(bgInput.value);
  updatePreview();
});

textSwatch.addEventListener('click', () => {
  textNative.value = isValidHex(textInput.value) ? textInput.value : '#a0a8d0';
  textNative.click();
});
textNative.addEventListener('input', () => {
  textInput.value = textNative.value;
  updatePreview();
});

document.getElementById('eyedrop-bg').addEventListener('click', () => {
  window.api.colorPickStart('bg');
});
document.getElementById('eyedrop-text').addEventListener('click', () => {
  window.api.colorPickStart('text');
});

window.api.on('eyedrop-result', (target, hex) => {
  if (target === 'bg') bgInput.value = hex;
  else textInput.value = hex;
  updatePreview();
});

window.api.on('todo-colorpick-init', (bg, text) => {
  bgInput.value   = (bg   && isValidHex(bg))   ? bg   : '#272830';
  textInput.value = (text && isValidHex(text))  ? text : autoContrast(bgInput.value);
  updatePreview();
});

updatePreview();
</script>
</body>
</html>
