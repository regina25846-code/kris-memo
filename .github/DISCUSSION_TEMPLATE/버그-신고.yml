title: "[버그] "
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: 문제 설명
      placeholder: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      placeholder: 어떤 상황에서 발생하는지 단계별로 작성해 주세요.
  - type: input
    id: version
    attributes:
      label: K-Memo 버전
      placeholder: "예: v1.2.1"
  - type: dropdown
    id: os
    attributes:
      label: 운영체제
      options:
        - Windows 11
        - Windows 10
        - macOS
        - 기타
