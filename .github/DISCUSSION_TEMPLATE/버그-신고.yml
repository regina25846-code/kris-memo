title: "[버그] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        버그 신고 게시판입니다.
        사용 중 오류, 충돌, 의도하지 않은 동작이 발생하면 아래 내용을 포함하여 신고해 주세요.
        접수된 내용은 검토 후 순차적으로 반영됩니다.

  - type: textarea
    id: description
    attributes:
      label: 문제 설명
      placeholder: 어떤 문제가 발생했나요?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      placeholder: 어떤 상황에서 발생하는지 단계별로 작성해 주세요.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: K-Memo 버전
      placeholder: "예: v1.2.1"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: 운영체제
      options:
        - Windows 11
        - Windows 10
        - macOS
        - 기타
    validations:
      required: false
