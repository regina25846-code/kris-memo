name: 건의사항 텔레그램 알림

on:
  discussion:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      discussions: write
    steps:
      - name: 텔레그램 알림 전송
        run: |
          TEXT="📋 새 건의사항이 올라왔어요!%0A%0A제목: ${{ github.event.discussion.title }}%0A작성자: ${{ github.event.discussion.user.login }}%0A%0A${{ github.event.discussion.html_url }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}"
      - name: 접수 확인 답글 등록
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCUSSION_ID: ${{ github.event.discussion.node_id }}
        run: |
          BODY=$(cat << 'MSGEOF'
안녕하세요! 버그 신고 접수되었습니다. 🙏

내용 검토 후 순차적으로 처리하겠습니다.
추가 정보가 필요하면 다시 안내드릴게요.

— K-Memo 팀
MSGEOF
)
          gh api graphql -f query='
            mutation($id: ID!, $body: String!) {
              addDiscussionComment(input: {discussionId: $id, body: $body}) {
                comment { id }
              }
            }
          ' -f id="$DISCUSSION_ID" -f body="$BODY"
