<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>업데이트 완료</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Pretendard', -apple-system, 'Segoe UI', '맑은 고딕', 'Malgun Gothic', sans-serif;
  font-size: 13px;
  background: transparent;
}
body { display: flex; align-items: center; justify-content: center; }

/* ── 외곽 프레임 (선 + 그림자 여백) ── */
.win-frame {
  padding: 10px;
  border: 1px solid rgba(0,0,0,0.6);
  border-radius: 20px;
  background: transparent;
  -webkit-app-region: drag;
}

/* ── 팝업 카드 ── */
.popup {
  width: 380px;
  background: #0d0d0d;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 6px 32px rgba(0,0,0,0.85);
  -webkit-app-region: drag;
}

/* ── Header ── */
.popup-header {
  background: #111111;
  padding: 20px 22px 16px;
  -webkit-app-region: drag;
}
.version-badge {
  display: inline-block;
  background: rgba(96,205,255,0.15);
  border: 1px solid rgba(96,205,255,0.4);
  color: #60CDFF;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
  letter-spacing: 0.3px;
}
.popup-title {
  font-size: 19px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.3px;
}
.popup-subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
}

/* ── Body ── */
.popup-body {
  padding: 16px 22px 12px;
  -webkit-app-region: no-drag;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  color: #60CDFF;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.change-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.change-item:last-child { border-bottom: none; }
.change-icon {
  width: 26px; height: 26px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 1px;
}
.change-text { flex: 1; }
.change-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  line-height: 1.3;
}
.change-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
  line-height: 1.4;
}

/* ── Footer ── */
.popup-footer {
  padding: 12px 22px 18px;
  display: flex;
  justify-content: flex-end;
  border-top: 1px solid rgba(255,255,255,0.06);
  -webkit-app-region: no-drag;
}
.btn-confirm {
  padding: 9px 32px;
  background: #60CDFF;
  border: none;
  border-radius: 9px;
  color: #1a1a1a;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s;
}
.btn-confirm:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="win-frame" id="win-frame">
  <div class="popup">
    <div class="popup-header">
      <div class="version-badge" id="version-badge">✦ NEW</div>
      <div class="popup-title">업데이트 완료!</div>
      <div class="popup-subtitle">K-Memo가 새로운 기능으로 돌아왔어요</div>
    </div>
    <div class="popup-body">
      <div class="section-label">변경 사항</div>
      <div id="change-list"></div>
    </div>
    <div class="popup-footer">
      <button class="btn-confirm" id="btn-confirm">확인</button>
    </div>
  </div>
</div>
<script src="whats_new.js"></script>
</body>
</html>
